# HOL plugin-scanner configuration.
#
# SHELL_INJECTION_PATTERN is disabled because every finding the scanner reports
# for it in this repository is a false positive, and the default policy profile
# does not require this rule to execute:
#   - packages/boss-cli/src/runtime/application/wip-checkpoint.ts and
#     scripts/hooks/wip-checkpoint.js call spawnSync('git', [..args]) with an
#     argument array and no shell, so input cannot be interpreted as shell.
#   - scripts/release.js is a maintainer-only release script invoking hardcoded
#     git/npm commands; it is never run on untrusted input.
#
# HARDCODED_SECRET is intentionally left enabled (the default policy profile
# requires it to execute). The example/test credentials in docs and tests use
# the scanner's recognized example/placeholder forms so they are not flagged.
[rules]
disabled = ["SHELL_INJECTION_PATTERN"]
